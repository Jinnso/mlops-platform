apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  mlops-overview.json: |
    {
      "dashboard": {
        "title": "MLOps Platform Overview",
        "uid": "mlops-overview",
        "panels": [
          {
            "id": 1,
            "title": "Model Predictions per Minute",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(bentoml_request_duration_seconds_count{job=\"taxi-fare-serving\"}[5m])",
                "legendFormat": "Requests/s"
              }
            ]
          },
          {
            "id": 2,
            "title": "Model Latency (p99)",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.99, rate(bentoml_request_duration_seconds_bucket[5m]))",
                "legendFormat": "p99 latency"
              }
            ]
          },
          {
            "id": 3,
            "title": "Prediction Errors",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(bentoml_request_total{status=\"error\"}[5m])",
                "legendFormat": "Errors/s"
              }
            ]
          },
          {
            "id": 4,
            "title": "MLflow Registered Models",
            "type": "stat",
            "targets": [
              {
                "expr": "mlflow_registered_models_total",
                "legendFormat": "Models"
              }
            ]
          },
          {
            "id": 5,
            "title": "MinIO Storage Usage",
            "type": "gauge",
            "targets": [
              {
                "expr": "minio_cluster_usage_total_bytes / minio_cluster_capacity_usable_total_bytes * 100",
                "legendFormat": "Usage %"
              }
            ]
          }
        ],
        "templating": {
          "list": []
        },
        "time": {
          "from": "now-6h",
          "to": "now"
        }
      }
    }
  model-health.json: |
    {
      "dashboard": {
        "title": "Model Health & Drift",
        "uid": "model-health",
        "panels": [
          {
            "id": 1,
            "title": "Data Drift Score",
            "type": "graph",
            "targets": [
              {
                "expr": "evidently_data_drift_score",
                "legendFormat": "Drift Score"
              }
            ]
          },
          {
            "id": 2,
            "title": "Feature Drift Distribution",
            "type": "bargauge",
            "targets": [
              {
                "expr": "evidently_feature_drift_score",
                "legendFormat": "{{ feature }}"
              }
            ]
          },
          {
            "id": 3,
            "title": "Model RMSE Trend",
            "type": "graph",
            "targets": [
              {
                "expr": "mlflow_run_metric_rmse",
                "legendFormat": "RMSE"
              }
            ]
          },
          {
            "id": 4,
            "title": "Prediction Distribution Drift",
            "type": "stat",
            "targets": [
              {
                "expr": "evidently_dataset_drift",
                "legendFormat": "Drift Detected"
              }
            ]
          }
        ],
        "templating": {
          "list": []
        },
        "time": {
          "from": "now-7d",
          "to": "now"
        }
      }
    }
