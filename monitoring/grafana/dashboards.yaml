apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  mlops-overview.json: |
    {
      "title": "MLOps Platform Overview",
      "uid": "mlops-overview",
      "tags": ["mlops", "platform"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Model Predictions Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "rate(bentoml_request_duration_seconds_count[5m])",
              "legendFormat": "Requests/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Model Latency (p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(bentoml_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p99 latency",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Active Services",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "count(up)",
              "legendFormat": "Active Services",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 4,
          "title": "K8s Pods Running",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "count(kube_pod_info)",
              "legendFormat": "Pods",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area"
          }
        }
      ],
      "time": {"from": "now-1h", "to": "now"}
    }
  model-health.json: |
    {
      "title": "Model Health & Drift",
      "uid": "model-health",
      "tags": ["mlops", "drift"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "panels": [
        {
          "id": 1,
          "title": "Prometheus Targets Up",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "count(up == 1)",
              "legendFormat": "Up",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 3}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "MLOps Namespace Pods",
          "type": "table",
          "gridPos": {"h": 6, "w": 18, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"mlops\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Scrape Duration",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 6},
          "targets": [
            {
              "expr": "rate(prometheus_http_request_duration_seconds_sum[5m]) / rate(prometheus_http_request_duration_seconds_count[5m])",
              "legendFormat": "Scrape time",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 4,
          "title": "Prometheus Uptime",
          "type": "stat",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 6},
          "targets": [
            {
              "expr": "time() - process_start_time_seconds{job=\"prometheus\"}",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        }
      ],
      "time": {"from": "now-6h", "to": "now"}
    }
