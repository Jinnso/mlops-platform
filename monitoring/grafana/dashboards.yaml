apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  mlops-overview.json: |
    {
      "title": "MLOps Platform Overview",
      "uid": "mlops-overview",
      "tags": ["mlops", "platform"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Service Health (up)",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "count(up == 1)",
              "legendFormat": "Up",
              "refId": "A"
            },
            {
              "expr": "count(up == 0) or vector(0)",
              "legendFormat": "Down",
              "refId": "B"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 3}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Targets Status",
          "type": "table",
          "gridPos": {"h": 6, "w": 18, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "up",
              "legendFormat": "{{job}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "value": "1", "text": "UP"},
                {"type": "value", "value": "0", "text": "DOWN"}
              ]
            }
          }
        },
        {
          "id": 3,
          "title": "Time Series Count",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 6},
          "targets": [
            {
              "expr": "prometheus_tsdb_head_series",
              "legendFormat": "Active Series",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Scrape Duration (seconds)",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 6},
          "targets": [
            {
              "expr": "scrape_duration_seconds",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 5,
          "title": "Samples Scraped per Second",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "rate(prometheus_tsdb_head_samples_appended_total[5m])",
              "legendFormat": "Samples/s",
              "refId": "A"
            }
          ]
        }
      ],
      "time": {"from": "now-1h", "to": "now"}
    }
  model-health.json: |
    {
      "title": "Model Health & Drift",
      "uid": "model-health",
      "tags": ["mlops", "drift"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "panels": [
        {
          "id": 1,
          "title": "Prometheus Uptime",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "time() - process_start_time_seconds{job=\"prometheus\"}",
              "legendFormat": "Uptime",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 2,
          "title": "Scrape Interval Actual",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 18, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "scrape_duration_seconds",
              "legendFormat": "{{job}} ({{instance}})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 3,
          "title": "Storage Retention",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 6},
          "targets": [
            {
              "expr": "prometheus_tsdb_retention_limit_seconds",
              "legendFormat": "Retention",
              "refId": "A"
            }
          ],
          "options": {"colorMode": "value"},
          "fieldConfig": {
            "defaults": {"unit": "d"}
          }
        },
        {
          "id": 4,
          "title": "Query Rate",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 18, "x": 6, "y": 6},
          "targets": [
            {
              "expr": "rate(prometheus_http_requests_total[5m])",
              "legendFormat": "{{handler}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "TSDB Blocks",
          "type": "stat",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "prometheus_tsdb_blocks_loaded",
              "legendFormat": "Blocks",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "id": 6,
          "title": "Go Memory Allocations",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "rate(go_memstats_alloc_bytes_total[5m]) / 1024 / 1024",
              "legendFormat": "Alloc MB/s",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "mbytes"}
          }
        }
      ],
      "time": {"from": "now-6h", "to": "now"}
    }
