apiVersion: v1
kind: ConfigMap
metadata:
  name: bentoml-config
  namespace: mlops
data:
  mlflow_tracking_uri: "http://mlflow.mlops.svc.cluster.local:5000"
  model_name: "taxi_fare_predictor"
  model_stage: "Production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxi-fare-serving
  namespace: mlops
  labels:
    app: taxi-fare-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taxi-fare-serving
  template:
    metadata:
      labels:
        app: taxi-fare-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bentoml
          image: docker.io/library/taxi_fare_predictor:4oek3os4v2o7xlvy
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: BENTOML_PORT
              value: "3000"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: taxi-fare-serving
  namespace: mlops
spec:
  selector:
    app: taxi-fare-serving
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taxi-fare-serving-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taxi-fare-serving
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
