apiVersion: v1
kind: ConfigMap
metadata:
  name: bentoml-config
  namespace: mlops
data:
  mlflow_tracking_uri: "http://mlflow.mlops.svc.cluster.local:5000"
  model_name: "taxi_fare_predictor"
  model_stage: "Production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxi-fare-serving
  namespace: mlops
  labels:
    app: taxi-fare-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taxi-fare-serving
  template:
    metadata:
      labels:
        app: taxi-fare-serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: bentoml
          image: ghcr.io/jinnso/taxi-fare-serving:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: bentoml-config
                  key: mlflow_tracking_uri
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: bentoml-config
                  key: model_name
            - name: MODEL_STAGE
              valueFrom:
                configMapKeyRef:
                  name: bentoml-config
                  key: model_stage
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.storage.svc.cluster.local:9000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: taxi-fare-serving
  namespace: mlops
spec:
  selector:
    app: taxi-fare-serving
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taxi-fare-serving-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taxi-fare-serving
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
