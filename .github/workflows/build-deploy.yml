name: Build and Deploy Serving

on:
  push:
    branches: [main]
    paths:
      - "serving/**"
      - ".github/workflows/build-deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-serving

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./serving
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update ArgoCD image tag
        run: |
          sed -i "s|ghcr.io/jinnso/taxi-fare-serving:.*|ghcr.io/jinnso/taxi-fare-serving:sha-${{ github.sha }}|g" k8s/bentoml/serving.yaml
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add k8s/bentoml/serving.yaml
          git commit -m "chore: update serving image to ${{ github.sha }}" || true
          git push
