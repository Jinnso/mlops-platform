name: Evidently Monitoring

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r monitoring/evidently/requirements.txt

      - name: Run monitoring
        id: monitor
        run: python monitoring/evidently/monitor.py
        continue-on-error: true

      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: evidently-report
          path: monitoring/evidently/reports/
