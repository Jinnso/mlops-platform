name: Evidently Monitoring

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install evidently pandas numpy pyarrow

      - name: Run monitoring
        run: python monitoring/evidently/monitor.py

      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: evidently-report
          path: monitoring/evidently/reports/
