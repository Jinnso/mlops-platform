name: Continuous Training

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ml-flow/requirements.txt

      - name: Retrain model
        run: python ml-flow/src/train.py

      - name: Evaluate new model
        run: python ml-flow/src/evaluate.py

      - name: Compare and promote
        run: python ml-flow/src/promote_model.py

      - name: Trigger deployment if promoted
        if: success()
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build-deploy.yml
          token: ${{ secrets.GITHUB_TOKEN }}
